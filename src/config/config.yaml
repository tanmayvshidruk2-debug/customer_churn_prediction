project:
  name: customer_churn_training

data:
  input_path: data/raw/customer_churn_dataset.csv
  processed_path: data/processed/processed_data.csv

  required_columns:
    - customer_id
    - age
    - tenure_months
    - monthly_charges
    - total_charges
    - contract_type
    - internet_service
    - support_calls
    - late_payments
    - churn

  target_column: churn

  allowed_missing_pct: 0.2


training:
  save_model: true
  model_registry_path: model_registry

  random_state: 42
  test_size: 0.2
  target_column: churn
  cross_validation_folds: 10
  
  # Columns to exclude from training
  exclude_columns:
    - customer_id
    - age
    - monthly_charges
    - Date
    - avg_monthly_value
    - support_call_ratio
    - payment_risk
  
  # SMOTE configuration
  apply_smote: true
  smote_k_neighbors: 5

  model:
    type: xgboost   # options: xgboost

    xgboost:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42
      n_jobs: -1


evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
   

